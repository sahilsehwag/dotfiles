# which-key.conf — Key tree configuration
#
# Format: key_sequence | label | command
#
# - Empty command = namespace (group of keys)
# - Nested keys use space separation (e.g., "p c" is child of "p")
#
# Command prefixes:
#   !cmd     → run in bottom popup
#   %cmd     → run in split pane
#   >cmd     → run in new window
#   (none)   → raw tmux command

# Project
p   | project
p c | lint + tc + test   | %ucheck
p s | setup              | %usetup
p i | install            | !jz install
p f | new-feature        | !ufeat
p F | new-feature-tree   | >arh-feature-tree
p t | new-tree           | >arh-feature-tree-distribute
p T | new-tree + publish | >arh-feature-tree-distribute --publish
p r | rebase             | >arh rebase
p R | rebase-tree        | >arh rebase -t .
p p | publish            | >arh publish

# Git
#g   | Git
#g s | Status  | !git status
#g p | Push    | !git push
#g l | Log     | !git log --oneline -20

# Sessions
#s | Sessions  | choose-tree -sZ -O name
#d | Detach    | detach
#x | Kill      | confirm-before -p "Kill session? (y/n)" kill-session
