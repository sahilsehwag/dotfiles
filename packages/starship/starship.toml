command_timeout = 2000
format = "$username$hostname$localip$shlvl$singularity$kubernetes$nats$directory$vcsh$fossil_branch$fossil_metrics$git_branch$custom.worktree$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$sudo$cmd_duration$line_break$jobs$battery$time$status$container$netns$os$shell$character"

[custom.worktree]
command = '''
worktree_name="$(basename "$(git rev-parse --show-toplevel)")"
if [ "$worktree_name" = ".worktree" ]; then
  worktree_name="$(git branch --show-current 2>/dev/null)"
fi
if [ -z "$worktree_name" ]; then
  worktree_name="$(basename "$(git rev-parse --git-dir)")"
fi
if [ "$worktree_name" = ".worktree" ]; then
  worktree_name="$(git rev-parse --short HEAD 2>/dev/null)"
fi
printf '%s' "$worktree_name"
'''
when = '''
git_dir="$(git rev-parse --git-dir 2>/dev/null)" || exit 1
common_dir="$(git rev-parse --git-common-dir 2>/dev/null)" || exit 1
[ "$git_dir" != "$common_dir" ]
'''
symbol = "🌳 "
format = "[$symbol$output]($style) "
style = "green"
